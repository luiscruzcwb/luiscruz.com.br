# Dev local com observabilidade completa
# Uso: docker compose up --build
# Requer: VM 100 acessível em 192.168.18.152 (otel-collector)

services:

  portfolio:
    build: .
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./css:/usr/share/nginx/html/css:ro
      - ./font:/usr/share/nginx/html/font:ro
      - ./img:/usr/share/nginx/html/img:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: portfolio-nginx-exporter
    restart: unless-stopped
    command: --nginx.scrape-uri=http://portfolio:80/stub_status
    ports:
      - "9113:9113"
    depends_on:
      - portfolio
